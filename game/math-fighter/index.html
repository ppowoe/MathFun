<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數學小鬥士</title>
	<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
	
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&family=Jersey+10&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
	<link href="style.css" rel="stylesheet">
</head>
<body>
    <!-- 封面 -->
    <div id="cover-screen" class="container-fluid d-flex align-items-center justify-content-center">
        <div class="text-center">
            <h1 class="title mb-4" data-text="數學小鬥士">數學小鬥士</h1>
            <p id="game-description" class="text-light fs-4 mb-4">用數學擊敗怪物！<br>成為最強的數學戰士</p>
			
			<div class="row mb-4">
				<div class="col-2">
					<h4 id="difficulty-title">難度</h4>
				</div>
				<div id="difficulty" class="btn-group col bg-dark" role="group" aria-label="Basic radio toggle button group">
					<input type="radio" class="btn-check" name="difficulty-radio" id="normal-mode-rbtn" autocomplete="off" value="Normal" checked>
					<label class="btn btn-outline-success align-self-center border-3" for="normal-mode-rbtn"><b>一般</b></label>

					<input type="radio" class="btn-check" name="difficulty-radio" id="hard-mode-rbtn" autocomplete="off" value="Hard">
					<label class="btn btn-outline-primary align-self-center border-3" for="hard-mode-rbtn"><b>困難</b></label>

					<input type="radio" class="btn-check" name="difficulty-radio" id="hell-mode-rbtn" autocomplete="off" value="Hell">
					<label class="btn btn-outline-danger align-self-center border-3" for="hell-mode-rbtn"><b>地獄</b></label>
				</div>
			</div>
            
            <button id="start-game-btn" class="btn btn-start mb-5">
                開始遊戲 (一般)
            </button>
            
            <div class="bg-dark bg-opacity-75 rounded-4 p-4 mx-auto" style="max-width: 320px;">
                <div class="d-flex flex-column align-items-center justify-content-center gap-2">
                    <span class="fs-5 text-warning">🏆 最高到達波數</span>
                    <span id="high-wave-display-normal" class="fs-6 fw-bold text-white">一般：0</span>
					<span id="high-wave-display-hard" class="fs-6 fw-bold text-white">困難：0</span>
					<span id="high-wave-display-hell" class="fs-6 fw-bold text-white">地獄：0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 遊戲畫面 -->
    <div id="game-screen" class="game-container d-none">
        
        <!-- 頂部狀態列 -->
        <div class="top-bar py-3">
            <div class="container">
                <div class="row align-items-center gx-3">
                    
                    <!-- 玩家資訊 -->
                    <div class="col-4">
                        <div class="d-flex align-items-center">
                            <div class="text-warning fw-bold me-3">小加</div>
                            <div id="player-hp-text" class="hp-hearts text-danger me-3"></div>
                            <div class="flex-grow-1">
                                <div class="progress" style="height: 18px; border-radius: 9999px;">
                                    <div id="player-hp-bar" class="progress-bar bg-danger" role="progressbar" style="width: 100%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 波數 -->
                    <div class="col-4 text-center">
                        <div class="badge bg-warning text-dark px-4 py-2 fs-4 rounded-pill shadow">
                            <span id="wave-number" class="fw-bold">第 1 波</span>
                        </div>
                    </div>
                    
                    <!-- 怪物資訊 -->
                    <div class="col-4 text-end">
                        <div class="d-flex align-items-center justify-content-end">
                            <div class="flex-grow-1 text-end me-3">
                                <div class="progress" style="height: 18px; border-radius: 9999px;">
                                    <div id="monster-hp-bar" class="progress-bar bg-success" role="progressbar" style="width: 100%"></div>
                                </div>
                            </div>
                            <div id="monster-hp-text" class="hp-hearts text-success me-3"></div>
                            <div id="monster-name-display" class="fw-bold text-warning"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 怪物區域 -->
        <div class="monster-area container">
            <div class="monster-card mx-auto">
                <div id="monster-emoji" class="monster-emoji mb-3"></div>
                <h3 id="monster-name-full" class="text-white mb-1 fw-bold"></h3>
            </div>
        </div>
        
        <!-- 行動面板 -->
        <div class="action-panel">
            <div class="container">
                <div class="row g-3" id="action-buttons">
                    <!-- 動態按鈕由 JS 產生 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 題目 Modal -->
    <div class="modal fade" id="question-modal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title text-white" id="modal-title">
                        <span id="modal-mode"></span> 數學題目
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center px-4">
                    
                    <!-- 題目顯示區 -->
                    <div id="question-display" class="question-display fs-1 fw-bold mb-4"></div>
                    
                    <!-- 計時器 (怪物回合才顯示) -->
                    <div id="timer-container" class="mb-4 d-none">
                        <div class="progress" style="height: 12px;">
                            <div id="timer-progress" class="progress-bar bg-warning" style="width: 100%"></div>
                        </div>
                        <div class="d-flex justify-content-between text-warning small mt-1">
                            <span>剩餘時間</span>
                            <span id="time-remaining">10.0 秒</span>
                        </div>
                    </div>
                    
                    <!-- 選擇題選項 -->
                    <div id="mcq-container" class="row g-3 d-none"></div>
                    
                    <!-- 數字輸入 -->
                    <div id="input-container" class="d-none">
                        <input type="number" id="answer-input" class="form-control form-control-lg text-center fs-3" 
                               placeholder="請輸入答案" autocomplete="off">
                        <div class="text-muted mt-3 small">答案為整數</div>
                    </div>
                </div>
                
                <div class="modal-footer border-0">
                    <button id="submit-btn" class="btn btn-lg btn-success w-100 py-3 rounded-4 fw-bold">
                        確認答案
                    </button>
                </div>
            </div>
        </div>
    </div>
	
	<!-- 離開 Modal -->
	<div class="modal fade" id="exit-modal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 justify-content-center">
                    <h4 class="modal-title text-white text-center" id="modal-title">
                        <b>確定離開遊戲？</b>
                    </h4>
                </div>
				<div class="modal-footer border-0">
                    <button id="exit-confirm-btn" class="btn btn-lg btn-success w-100 py-3 rounded-4 fw-bold">
                        是
                    </button>
					<button id="exit-deny-btn" class="btn btn-lg btn-success w-100 py-3 rounded-4 fw-bold">
                        否
                    </button>
                </div>
			</div>
		</div>
	</div>

    <!-- Toast 容器 -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;"></div>
	<script src="scripts/global-variables.js"></script>
	<script src="scripts/utilities.js"></script>
	<script src="scripts/questions.js"></script>
	<script src="scripts/monsters.js"></script>
	<script src="scripts/ui.js"></script>
	
	<script src="scripts/main.js"></script>
</body>
</html>
