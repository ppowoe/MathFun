<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數字迷宮</title>
	<link rel="icon" type="image/x-icon" href="math-maze.png">
	
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="style.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script src="bootstrap.min.js"></script>
</head>
<body>

<div id="game-container">
    <div id="screen-cover" class="screen active text-center">
        <h1 class="display-4 fw-bold mb-4 text-primary">數字迷宮</h1>
        
        <div class="mb-4">
            <label class="form-label fw-bold fs-5">選擇遊戲難度：</label>
            <div class="btn-group w-100" role="group">
                <input type="radio" class="btn-check" name="difficulty" id="diff-easy" value="easy" checked>
                <label class="btn btn-outline-success py-2" for="diff-easy">簡單 (5x5)</label>
                
                <input type="radio" class="btn-check" name="difficulty" id="diff-normal" value="normal">
                <label class="btn btn-outline-warning py-2" for="diff-normal">普通 (7x7)</label>
                
                <input type="radio" class="btn-check" name="difficulty" id="diff-hard" value="hard">
                <label class="btn btn-outline-danger py-2" for="diff-hard">困難 (9x9)</label>
            </div>
        </div>

        <button id="btn-start" class="btn btn-primary btn-lg w-100 py-3 fw-bold mb-4">開始遊戲</button>
        
        <div class="card p-3 bg-light text-start">
            <h5 class="fw-bold border-bottom pb-2 mb-2">最高到達關數</h5>
            <div class="row text-center">
                <div class="col-4 text-success">簡單：<span id="best-easy">0</span> 關</div>
                <div class="col-4 text-warning">普通：<span id="best-normal">0</span> 關</div>
                <div class="col-4 text-danger">困難：<span id="best-hard">0</span> 關</div>
            </div>
        </div>
		
		<a id="back-btn" href="/MathFun">
			<button class="btn btn-primary btn-outline-light border-3 text-red mt-3">
				⬅️返回首頁
			</button>
		</a>
    </div>

    <div id="screen-game" class="screen d-none">
        <div class="row text-center bg-light p-2 rounded mb-3 g-1 fw-bold fs-5">
            <div class="col-4 text-start text-dark">第 <span id="ui-level">1</span> 關</div>
            <div class="col-4 text-primary">目標：<span id="ui-target">0</span></div>
            <div class="col-4 text-end text-danger">時間：<span id="ui-time">60</span>s</div>
        </div>

        <div id="maze-grid"></div>

        <div class="row g-2 align-items-center text-center mt-3">
            <div class="col-2">
                <button class="btn btn-warning w-100 ctrl-btn px-1" id="btn-retry">重試</button>
            </div>
            <div class="col-2">
                <button class="btn btn-outline-primary w-100 ctrl-btn" id="btn-left">◀</button>
            </div>
            <div class="col-2 d-flex flex-column justify-content-between" style="height: 70px;">
                <button class="btn btn-outline-primary w-100 dir-stack-btn py-0" id="btn-up">▲</button>
                <button class="btn btn-outline-primary w-100 dir-stack-btn py-0" id="btn-down">▼</button>
            </div>
            <div class="col-2">
                <button class="btn btn-outline-primary w-100 ctrl-btn" id="btn-right">▶</button>
            </div>
            <div class="col-4">
                <button class="btn btn-danger w-100 ctrl-btn" id="btn-exit">退出遊戲</button>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="customModal" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center">
            <div class="modal-header border-0 justify-content-center">
                <h5 class="modal-title fw-bold" id="modalTitle">提示</h5>
            </div>
            <div class="modal-body py-4" id="modalBody">
                </div>
            <div class="modal-footer border-0 justify-content-center">
                <button type="button" class="btn btn-secondary d-none" id="btn-modal-cancel">取消</button>
                <button type="button" class="btn btn-primary px-4" id="btn-modal-ok">確定</button>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
